<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圓周變變變：尋找圓周率的秘密</title>
  <!-- 引入 React 與 Tailwind CSS，確保網頁可以直接執行且畫面美觀 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示元件 ---
    const Play = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const RotateCcw = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const Settings = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const Ruler = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3l-7.6-7.6a2 2 0 0 0-2.8 0l-1.4 1.4-1.4-1.4-1.4 1.4 1.4 1.4-1.4 1.4 1.4 1.4-1.4 1.4 1.4 1.4 1.4-1.4 1.4 1.4-1.4 1.4 1.4 1.4a2 2 0 0 0 2.8 0l7.6-7.6a2 2 0 0 0 0-2.8z"/><path d="M12 9l-1.4 1.4"/><path d="M15 12l-1.4 1.4"/><path d="M18 15l-1.4 1.4"/></svg>;
    const Info = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

    // --- 主程式邏輯 ---
    function PiTeachingTool() {
      const [inputValue, setInputValue] = useState('10');
      const [diameter, setDiameter] = useState(10);
      const [animTime, setAnimTime] = useState(0); 
      const [isAnimating, setIsAnimating] = useState(false);
      const animationRef = useRef(null);

      const UNIT_PX = 20; 
      
      const R = (diameter * UNIT_PX) / 2;     
      const Dv = diameter * UNIT_PX;          
      const Cv = diameter * Math.PI * UNIT_PX;
      
      const Cx = R + 80;                      
      const Cy = R + 80;                      
      const CompareY = Cy + R + 100;          

      const SVG_WIDTH = Math.max(800, Cx + Cv + 150);
      const SVG_HEIGHT = CompareY + 100;

      const handleGenerate = () => {
        const val = parseFloat(inputValue);
        if (!isNaN(val) && val > 0) {
          if (val > 40) {
            alert("數字有點大喔！畫面可能需要往右滑動才看得完。");
          }
          setDiameter(val);
          setAnimTime(0);
          setIsAnimating(false);
          cancelAnimationFrame(animationRef.current);
        } else {
          alert("請輸入大於 0 的數字喔！");
        }
      };

      const handleUnroll = () => {
        if (isAnimating) return;
        setIsAnimating(true);
        setAnimTime(0);

        let start = null;
        const duration = 6000; 

        const step = (timestamp) => {
          if (!start) start = timestamp;
          const progress = (timestamp - start) / duration;
          
          if (progress < 1) {
            setAnimTime(progress);
            animationRef.current = requestAnimationFrame(step);
          } else {
            setAnimTime(1);
            setIsAnimating(false);
          }
        };
        
        animationRef.current = requestAnimationFrame(step);
      };

      const handleReset = () => {
        cancelAnimationFrame(animationRef.current);
        setAnimTime(0);
        setIsAnimating(false);
      };

      useEffect(() => {
        return () => cancelAnimationFrame(animationRef.current);
      }, []);

      const clamp = (val) => Math.min(Math.max(val, 0), 1);
      
      const unrollP = clamp(animTime / 0.35);
      const d1MoveP = clamp((animTime - 0.35) / 0.15);
      const d2MoveP = clamp((animTime - 0.50) / 0.15);
      const d3MoveP = clamp((animTime - 0.65) / 0.15);
      const gapP = clamp((animTime - 0.80) / 0.20);

      const d1StartX = (Cx - R) + R * d1MoveP;
      const d1EndX = (Cx + R) + R * d1MoveP;
      const d1Y = Cy + (CompareY - Cy) * d1MoveP;

      const d2StartX = Cx + Dv * d2MoveP;
      const d2EndX = Cx + Dv + Dv * d2MoveP;

      const d3StartX = Cx + Dv + Dv * d3MoveP;
      const d3EndX = Cx + Dv * 2 + Dv * d3MoveP;

      const describeArc = (x, y, radius, startAngle, endAngle) => {
        const polarToCartesian = (centerX, centerY, r, angleInDegrees) => {
          const angleInRadians = (angleInDegrees) * Math.PI / 180.0;
          return { x: centerX + (r * Math.cos(angleInRadians)), y: centerY + (r * Math.sin(angleInRadians)) };
        };
        const start = polarToCartesian(x, y, radius, startAngle);
        const end = polarToCartesian(x, y, radius, endAngle);
        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
        return ["M", start.x, start.y, "A", radius, radius, 0, largeArcFlag, 1, end.x, end.y].join(" ");
      };

      const startAngle = 90 + (unrollP * 359.9);
      const endAngle = 449.9;
      const arcPath = describeArc(Cx, Cy, R, startAngle, endAngle);

      return (
        <div className="min-h-screen p-4 md:p-8 font-sans">
          <div className="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
            
            <div className="bg-blue-600 p-6 text-white relative z-10 shadow-md">
              <h1 className="text-2xl font-bold flex items-center gap-2 mb-4">
                <Ruler />
                圓周變變變：尋找圓周率的秘密
              </h1>
              
              <div className="flex flex-wrap gap-4 items-end justify-between">
                <div className="flex flex-col gap-1">
                  <label className="text-sm font-medium text-blue-100 flex items-center gap-1">
                    設定直徑 (1 單位 = 1 個背景網格)
                  </label>
                  <div className="flex items-center gap-2">
                    <input 
                      type="number" 
                      value={inputValue}
                      onChange={(e) => setInputValue(e.target.value)}
                      className="px-3 py-2 rounded-lg text-slate-800 w-24 font-bold focus:outline-none focus:ring-2 focus:ring-yellow-400"
                      min="1" max="40"
                    />
                    <button 
                      onClick={handleGenerate}
                      className="bg-blue-500 hover:bg-blue-400 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-1 shadow-sm font-bold"
                    >
                      <Settings />
                      產生依比例的圓
                    </button>
                  </div>
                </div>

                <div className="flex gap-2">
                  <button 
                    onClick={handleUnroll}
                    disabled={isAnimating || animTime === 1}
                    className={`px-6 py-2 rounded-lg font-bold flex items-center gap-2 shadow-md transition-all
                      ${(isAnimating || animTime === 1) ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-yellow-400 hover:bg-yellow-300 text-yellow-900 hover:scale-105'}`}
                  >
                    <Play />
                    展開圓周！
                  </button>
                  <button 
                    onClick={handleReset}
                    className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg transition-colors flex items-center gap-2 shadow-sm font-bold"
                  >
                    <RotateCcw />
                    重設
                  </button>
                </div>
              </div>
            </div>

            <div className="relative w-full overflow-x-auto bg-[#f8fafc] border-b-2 border-slate-200" style={{ height: Math.min(600, SVG_HEIGHT + 20) }}>
              <svg width={SVG_WIDTH} height={SVG_HEIGHT} className="block">
                <pattern id="grid" width={UNIT_PX} height={UNIT_PX} patternUnits="userSpaceOnUse">
                  <path d={`M ${UNIT_PX} 0 L 0 0 0 ${UNIT_PX}`} fill="none" stroke="#e2e8f0" strokeWidth="1"/>
                </pattern>
                <rect width="100%" height="100%" fill="url(#grid)" />

                <line x1={Cx} y1="0" x2={Cx} y2={SVG_HEIGHT} stroke="#cbd5e1" strokeWidth="1" strokeDasharray="4,4" />

                <g opacity={animTime > 0 ? 0.3 : 0.8} style={{ transition: 'opacity 0.5s' }}>
                  <line x1={Cx - R} y1={Cy} x2={Cx + R} y2={Cy} stroke="#64748b" strokeWidth="4" strokeDasharray="6,6" />
                  <circle cx={Cx} cy={Cy} r={4} fill="#475569" />
                  <text x={Cx} y={Cy - 15} textAnchor="middle" fill="#334155" fontSize="15" fontWeight="bold">
                    直徑 = {diameter}
                  </text>
                </g>

                {unrollP < 1 && (
                  <path d={arcPath} fill="none" stroke="#ef4444" strokeWidth="4" strokeLinecap="round" />
                )}
                {unrollP > 0 && (
                  <g>
                    <line x1={Cx} y1={Cy + R} x2={Cx + unrollP * Cv} y2={Cy + R} stroke="#ef4444" strokeWidth="4" strokeLinecap="round" />
                    {unrollP === 1 && (
                      <text x={Cx + Cv/2} y={Cy + R - 15} textAnchor="middle" fill="#dc2626" fontSize="15" fontWeight="bold">
                        展開的圓周長 ≈ {(diameter * Math.PI).toFixed(2)}
                      </text>
                    )}
                  </g>
                )}

                {(d1MoveP > 0) && (
                  <line x1={Cx} y1={Cy + R} x2={Cx} y2={CompareY} stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" opacity={d1MoveP} />
                )}

                <g>
                  <line x1={d1StartX} y1={d1Y} x2={d1EndX} y2={d1Y} stroke="#3b82f6" strokeWidth="8" strokeLinecap="square" />
                  <line x1={d1StartX} y1={d1Y - 8} x2={d1StartX} y2={d1Y + 8} stroke="#1e40af" strokeWidth="3" />
                  <line x1={d1EndX} y1={d1Y - 8} x2={d1EndX} y2={d1Y + 8} stroke="#1e40af" strokeWidth="3" />
                  {d1MoveP > 0.1 && (
                    <text x={(d1StartX + d1EndX) / 2} y={d1Y + 25} textAnchor="middle" fill="#1d4ed8" fontSize="14" fontWeight="bold" opacity={d1MoveP}>
                      1個直徑
                    </text>
                  )}
                </g>

                {d2MoveP > 0 && (
                  <g>
                    <line x1={d2StartX} y1={CompareY} x2={d2EndX} y2={CompareY} stroke="#0ea5e9" strokeWidth="8" strokeLinecap="square" />
                    <line x1={d2EndX} y1={CompareY - 8} x2={d2EndX} y2={CompareY + 8} stroke="#0369a1" strokeWidth="3" />
                    <text x={(d2StartX + d2EndX) / 2} y={CompareY + 25} textAnchor="middle" fill="#0369a1" fontSize="14" fontWeight="bold">
                      2個直徑
                    </text>
                  </g>
                )}

                {d3MoveP > 0 && (
                  <g>
                    <line x1={d3StartX} y1={CompareY} x2={d3EndX} y2={CompareY} stroke="#6366f1" strokeWidth="8" strokeLinecap="square" />
                    <line x1={d3EndX} y1={CompareY - 8} x2={d3EndX} y2={CompareY + 8} stroke="#4338ca" strokeWidth="3" />
                    <text x={(d3StartX + d3EndX) / 2} y={CompareY + 25} textAnchor="middle" fill="#4338ca" fontSize="14" fontWeight="bold">
                      3個直徑
                    </text>
                  </g>
                )}

                {gapP > 0 && (
                  <g opacity={gapP}>
                    <line x1={Cx + Dv*3} y1={CompareY} x2={Cx + Cv} y2={CompareY} stroke="#f59e0b" strokeWidth="8" strokeLinecap="square" />
                    <line x1={Cx + Cv} y1={CompareY - 8} x2={Cx + Cv} y2={CompareY + 8} stroke="#b45309" strokeWidth="3" />
                    <path d={`M ${Cx + Dv*3 + 5} ${CompareY - 25} Q ${Cx + Cv} ${CompareY - 40} ${Cx + Cv + 20} ${CompareY - 20}`} fill="none" stroke="#d97706" strokeWidth="2" strokeDasharray="2,2"/>
                    <text x={Cx + Cv + 25} y={CompareY - 15} fill="#b45309" fontSize="14" fontWeight="bold">
                      多出約 0.14 倍
                    </text>
                    <line x1={Cx + Cv} y1={Cy + R} x2={Cx + Cv} y2={CompareY} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,4" className="animate-pulse" />
                  </g>
                )}
              </svg>
            </div>

            <div className="p-6 bg-white border-t-2 border-slate-100">
              <div className={`p-4 rounded-xl border-2 transition-all duration-500 ${gapP > 0 ? 'bg-yellow-50 border-yellow-200' : 'bg-slate-50 border-slate-200'}`}>
                <h3 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                  <Info />
                  觀察室：
                </h3>
                <ul className="list-disc list-inside space-y-2 text-slate-700 font-medium">
                  <li>你可以試著輸入不同的直徑 (如 5、10、15)，你會發現：<strong>數字越大，畫面上的圓就真的按比例變大！</strong> (背景的 1 個小網格 = 1 單位)</li>
                  {animTime === 0 && <li>按下「展開圓周！」按鈕，看看圓周攤平後有多長。</li>}
                  {unrollP > 0 && unrollP < 1 && <li>正在將紅色的圓周攤平成為直線...</li>}
                  {d1MoveP > 0 && d3MoveP < 1 && <li>將圓內原本的藍色直徑<strong>往下移動</strong>，並開始複製長度來和圓周長比較...</li>}
                  {gapP > 0 && (
                    <li className="text-yellow-900 mt-4 text-lg">
                      <strong>發現了嗎？</strong> 不管你剛才輸入的圓有多大或多小，圓周長永遠等於 
                      <span className="bg-yellow-200 px-2 py-1 rounded mx-2 text-red-600 font-bold border border-yellow-300">
                        3 個完整的直徑，再多出一點點 (約 0.14)
                      </span>！
                    </li>
                  )}
                </ul>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PiTeachingTool />);
  </script>
</body>
</html>
